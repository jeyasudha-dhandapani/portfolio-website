<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personal Interests</title>

  <style>
    body {
      background: linear-gradient(to bottom, #3c0456, #0c0000);
      color: #fff;
      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      position: fixed;
      top: 0;
      left: 0;
      width: 15%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      justify-content: space-around;
      padding: 20px 0;
      margin-left: 4%;
    }

    .port {
      padding: 20px;
      width: 100%;
      text-align: center;
      background-color: #9e9da0;
      border-bottom: 1px solid #0e1504;
      cursor: pointer;
      border-radius: 15px;
    }

    .port:hover {
      background-color: #5aaee2;
      color: #000;
    }

    .port a {
      color: rgb(200, 13, 72);
      font-size: 25px;
      display: block;
      text-decoration: none;
    }

    .grid_container {
      display: grid;
      grid-template-columns: 1fr;
      width: 30%;
      margin-left: 50%;
      margin-top: 2%;
      padding: 20px;
      background-color: cadetblue;
      border-radius: 15px;
      font-size: 20px;
    }

    .grid_container h1, .grid_container h2 {
      color: #000;
    }

    .grid_container ul {
      padding-left: 20px;
      color: #000;
    }

    .youtube {
      margin-left: 50%;
      margin-top: 20px;
    }

    h3 {
      margin-left: 65%;
      color: rgb(46, 180, 220);
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="navbar">
      <div class="port"><a href="index.html">HOME</a></div>
      <div class="port"><a href="about.html">ABOUT</a></div>
      <div class="port"><a href="profile.html">PROFILE</a></div>
      <div class="port"><a href="interest.html">INTEREST</a></div>
      <div class="port"><a href="achievement.html">ACHIEVEMENT</a></div>
      <div class="port"><a href="calendar.html">CALENDAR</a></div>
      <div class="port"><a href="contact.html">CONTACT</a></div>
      <div class="port"><a href="feedback.html">FEEDBACK</a></div>
      <div class="port"><a href="map.html">MAP</a></div>
    </div>
  </div>

  <div class="grid_container">
    <h1>Personal Interests</h1>
    <ul>
      <li>Learning new technologies</li>
      <li>Reading books on self-improvement</li>
      <li>Exploring different cultures</li>
    </ul>

    <h2>Hobbies</h2>
    <ul>
      <li>Playing badminton</li>
      <li>Watching crime thriller movies</li>
      <li>Listening to music</li>
    </ul>
  </div>

  <hr style="margin-left: 50%; margin-top: 20px; width: 30%;" />

  <h3>Youtube</h3>
  <div class="youtube">
    <iframe width="600" height="250" src="https://www.youtube.com/embed/aiMLIMmQbmc" title="YouTube video player" frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
  </div>
</body>
</html>
