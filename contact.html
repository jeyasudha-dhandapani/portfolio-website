<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Form</title>
  <style>
    body {
      background: linear-gradient(to bottom, #3c0456, #0c0000);
      height: 100vh;
      margin: 0;
      
    
    }

    .container {
      position: fixed;
      top: 0;
      left: 0;
      width: 15%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      justify-content: space-around;
      padding: 20px 0;
      margin-left: 4%;
    }

    .port {
      padding: 20px;
      width: 100%;
      text-align: center;
      background-color: #a4a1a4;
      border-bottom: 1px solid #0e1504;
      cursor: pointer;
      border-radius: 15px;
    }

    .port:hover {
      background-color: #5aaee2;
      color: #000;
    }

    .port a {
      text-decoration: none;
      color: rgb(200, 13, 72);
      font-size: 25px;
      display: block;
    }

    h1 {
      margin-left: 55%;
      font-size: 40px;
      margin-top: 10%;
      color: #44bde9;
    }

    #contact-form {
      display: flex;
      flex-direction: column;
      width: 50%;
      margin: 20px auto 40px auto;
      padding: 20px;
      border: 5px solid #42d3e6;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      margin-left: 40%;
      font-size: 25px;
      background-color: white;
    }

    label {
      margin-bottom: 10px;
      color: #000;
    }

    input, textarea {
      padding: 10px;
      margin-bottom: 20px;
      border: 2px solid #44bde9;
      font-size: 18px;
      border-radius: 5px;
    }

    textarea {
      resize: vertical;
      height: 100px;
    }

    button {
      padding: 10px 20px;
      background-color: #047007;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 20px;
    }

    button:hover {
      background-color: #a3e0a5;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="navbar">
      <div class="port"><a href="index.html">HOME</a></div>
      <div class="port"><a href="about.html">ABOUT</a></div>
      <div class="port"><a href="profile.html">PROFILE</a></div>
      <div class="port"><a href="interest.html">INTEREST</a></div>
      <div class="port"><a href="achievement.html">ACHIEVEMENT</a></div>
      <div class="port"><a href="calendar.html">CALENDAR</a></div>
      <div class="port"><a href="contact.html">CONTACT</a></div>
      <div class="port"><a href="feedback.html">FEEDBACK</a></div>
      <div class="port"><a href="map.html">MAP</a></div>
    </div>
  </div>

  <h1>CONTACT FORM</h1>
  <form id="contact-form">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required />
    
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required />
    
    <label for="message">Message:</label>
    <textarea id="message" name="message"></textarea>
    
    <button type="submit">Send Message</button>
  </form>
</body>
</html>
